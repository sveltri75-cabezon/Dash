<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 Mercados ARG</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230a0c0f'/><text y='72' x='50' text-anchor='middle' font-size='62' font-family='system-ui'>📈</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181c23;
    --border: #1e2330;
    --accent: #00e5a0;
    --accent2: #0088ff;
    --accent3: #ff4d6d;
    --accent4: #ffd166;
    --text: #e8eaf0;
    --muted: #5a6070;
    --mono: 'Space Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(0,229,160,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    background: rgba(10,12,15,0.9);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--display);
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  #last-update {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
  }

  .dot-live {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* LAYOUT */
  main {
    padding: 1.5rem 2rem;
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* SECTION LABEL */
  .section-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
    animation: fadeIn 0.5s ease both;
  }

  .card:hover { border-color: rgba(0,229,160,0.2); }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover::before { opacity: 0.5; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* BIG METRIC */
  .metric-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .metric-value {
    font-family: var(--display);
    font-size: 2.4rem;
    line-height: 1;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .metric-sub {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 0.65rem;
    font-weight: 700;
    margin-top: 0.5rem;
  }

  .badge-up { background: rgba(0,229,160,0.15); color: var(--accent); }
  .badge-down { background: rgba(255,77,109,0.15); color: var(--accent3); }
  .badge-neutral { background: rgba(90,96,112,0.2); color: var(--muted); }

  /* USD HERO CARDS */
  .usd-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .usd-card .flag {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2.5rem;
    opacity: 0.08;
    font-family: var(--display);
    letter-spacing: -0.05em;
  }

  /* TABLE */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 0.72rem;
  }

  .data-table th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    color: var(--muted);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .data-table td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid rgba(30,35,48,0.5);
    vertical-align: middle;
  }

  .data-table tbody tr:hover {
    background: rgba(255,255,255,0.02);
  }

  .data-table tbody tr:last-child td { border-bottom: none; }

  .ticker {
    font-weight: 700;
    color: var(--text);
    font-size: 0.75rem;
  }

  .price-col { color: var(--accent4); }
  .yield-col { color: var(--accent); }

  .change-pos { color: var(--accent); }
  .change-neg { color: var(--accent3); }

  /* SPINNER */
  .spinner-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    gap: 0.5rem;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
  }

  /* ERROR */
  .error-msg {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--accent3);
    padding: 1rem;
    text-align: center;
    opacity: 0.7;
  }

  /* BCRA CARD */
  .bcra-value {
    font-family: var(--display);
    font-size: 3rem;
    line-height: 1;
    color: var(--accent);
  }

  /* REFRESH BTN */
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* PLAZO FIJO */
  .pf-rate {
    font-family: var(--display);
    font-size: 2rem;
    color: var(--accent2);
  }

  /* Stagger animation delays */
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }

  .tab-bar {
    display: flex;
    gap: 0.25rem;
    margin-bottom: 0.75rem;
  }

  .tab {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    .grid-4 { grid-template-columns: 1fr; }
    main { padding: 1rem; }
    .metric-value { font-size: 1.8rem; }
  }

  .sparkline {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 28px;
    margin-top: 0.75rem;
    opacity: 0.5;
  }

  .spark-bar {
    flex: 1;
    background: var(--accent);
    border-radius: 1px;
    min-height: 3px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">MERCADOS<span>ARG</span></div>
  <div style="display:flex;align-items:center;gap:1rem;">
    <button class="refresh-btn" onclick="loadAll()">↻ Actualizar</button>
    <div id="last-update">
      <span class="dot-live"></span>
      <span id="update-time">—</span>
    </div>
  </div>
</header>

<main>

  <!-- ROW 1: USD MEP + CCL + BCRA + Plazo Fijo -->
  <section>
    <div class="section-label">Indicadores Clave</div>
    <div class="grid-4">

      <!-- USD MEP -->
      <div class="card" id="card-mep">
        <div class="spinner-wrap"><div class="spinner"></div><span class="loading-text">Cargando...</span></div>
      </div>

      <!-- USD CCL -->
      <div class="card" id="card-ccl">
        <div class="spinner-wrap"><div class="spinner"></div><span class="loading-text">Cargando...</span></div>
      </div>

      <!-- BCRA -->
      <div class="card" id="card-bcra">
        <div class="spinner-wrap"><div class="spinner"></div><span class="loading-text">Cargando...</span></div>
      </div>

      <!-- Plazo Fijo -->
      <div class="card" id="card-pf">
        <div class="spinner-wrap"><div class="spinner"></div><span class="loading-text">Cargando...</span></div>
      </div>

    </div>
  </section>

  <!-- ROW 2: Acciones + Bonos + Letras -->
  <section>
    <div class="section-label">Renta Variable & Fija</div>
    <div class="grid-3">

      <!-- Acciones -->
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:1.25rem 1.25rem 0.75rem;">
          <div class="metric-label">Acciones Argentinas</div>
        </div>
        <div id="card-stocks">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Bonos -->
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:1.25rem 1.25rem 0.75rem;">
          <div class="metric-label">Bonos Soberanos</div>
        </div>
        <div id="card-bonds">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Letras -->
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:1.25rem 1.25rem 0.75rem;">
          <div class="metric-label">Letras del Tesoro</div>
        </div>
        <div id="card-notes">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </section>

</main>

<script>
const SOURCES = {
  BCRA_Monetarias: "https://api.bcra.gob.ar/estadisticas/v4.0/monetarias/44",
  Plazo_Fijo:      "https://api.argentinadatos.com/v1/finanzas/tasas/plazoFijo/",
  USD_MEP:         "https://data912.com/live/mep",
  USD_CCL:         "https://data912.com/live/ccl",
  Acciones_Arg:    "https://data912.com/live/arg_stocks",
  Letras_Arg:      "https://data912.com/live/arg_notes",
  Bonos_Arg:       "https://data912.com/live/arg_bonds"
};

// Helper: proxy fetch (try direct, fallback to allorigins)
async function fetchData(url) {
  try {
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) {
    // try allorigins proxy
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r2 = await fetch(proxy);
    const j = await r2.json();
    return JSON.parse(j.contents);
  }
}

function fmt(n, dec=2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('es-AR', {minimumFractionDigits: dec, maximumFractionDigits: dec});
}

function changeBadge(v) {
  if (v == null) return '';
  const cls = v >= 0 ? 'change-pos' : 'change-neg';
  const sign = v >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${fmt(v)}%</span>`;
}

function badge(v) {
  if (v == null) return '';
  const cls = v >= 0 ? 'badge-up' : 'badge-down';
  const sign = v >= 0 ? '▲ +' : '▼ ';
  return `<span class="badge ${cls}">${sign}${fmt(Math.abs(v))}%</span>`;
}

function sparkline(prices) {
  if (!prices || !prices.length) return '';
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const range = max - min || 1;
  const bars = prices.map(p => {
    const h = Math.max(10, Math.round(((p - min) / range) * 100));
    return `<div class="spark-bar" style="height:${h}%"></div>`;
  }).join('');
  return `<div class="sparkline">${bars}</div>`;
}

// ------ USD MEP ------
async function loadMEP() {
  const el = document.getElementById('card-mep');
  try {
    const data = await fetchData(SOURCES.USD_MEP);
    // data could be array or object
    const arr = Array.isArray(data) ? data : [data];
    const item = arr[0] || {};
    const price = item.price ?? item.c ?? item.close ?? item.last ?? null;
    const change = item.change_pct ?? item.chg ?? item.variacion ?? null;
    el.innerHTML = `
      <div class="metric-label">USD MEP</div>
      <div class="metric-value">$${fmt(price, 2)}</div>
      <div class="metric-sub">Dólar Bolsa (T+0)</div>
      ${badge(change)}
      ${sparkline(arr.slice(-10).map(x => x.price ?? x.c ?? x.close ?? 0))}
    `;
  } catch(e) {
    el.innerHTML = `<div class="metric-label">USD MEP</div><div class="error-msg">Sin datos disponibles</div>`;
  }
}

// ------ USD CCL ------
async function loadCCL() {
  const el = document.getElementById('card-ccl');
  try {
    const data = await fetchData(SOURCES.USD_CCL);
    const arr = Array.isArray(data) ? data : [data];
    const item = arr[0] || {};
    const price = item.price ?? item.c ?? item.close ?? item.last ?? null;
    const change = item.change_pct ?? item.chg ?? item.variacion ?? null;
    el.innerHTML = `
      <div class="metric-label">USD CCL</div>
      <div class="metric-value" style="color:var(--accent2)">$${fmt(price, 2)}</div>
      <div class="metric-sub">Contado Con Liquidación</div>
      ${badge(change)}
      ${sparkline(arr.slice(-10).map(x => x.price ?? x.c ?? x.close ?? 0))}
    `;
  } catch(e) {
    el.innerHTML = `<div class="metric-label">USD CCL</div><div class="error-msg">Sin datos disponibles</div>`;
  }
}

// ------ BCRA ------
async function loadBCRA() {
  const el = document.getElementById('card-bcra');
  try {
    const data = await fetchData(SOURCES.BCRA_Monetarias);
    // BCRA returns { results: [{fecha, valor},...] }
    const results = data.results ?? data.data ?? data;
    const arr = Array.isArray(results) ? results : [];
    const last = arr[arr.length - 1] || {};
    const valor = last.valor ?? last.value ?? null;
    const fecha = last.fecha ?? last.date ?? '';
    el.innerHTML = `
      <div class="metric-label">BCRA Base Monetaria</div>
      <div class="bcra-value">${valor != null ? '$' + fmt(valor/1e9, 1) + 'B' : '—'}</div>
      <div class="metric-sub">Miles de millones ARS</div>
      <div class="metric-sub" style="margin-top:0.5rem;">${fecha ? '📅 ' + fecha : ''}</div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="metric-label">BCRA Base Monetaria</div><div class="error-msg">Sin datos disponibles</div>`;
  }
}

// ------ Plazo Fijo ------
async function loadPF() {
  const el = document.getElementById('card-pf');
  try {
    const data = await fetchData(SOURCES.Plazo_Fijo);
    const arr = Array.isArray(data) ? data : [];
    if (!arr.length) throw new Error('Sin datos');

    // Get latest date in dataset
    const fechas = arr.map(x => x.fecha ?? x.date ?? '').filter(Boolean).sort();
    const lastFecha = fechas[fechas.length - 1];
    const latest = lastFecha ? arr.filter(x => (x.fecha ?? x.date ?? '') === lastFecha) : arr;

    // Detect entity key
    const sample = latest[0] || arr[0];
    console.log('PF keys:', Object.keys(sample), 'sample:', sample);
    const entKey = ['entidad','banco','nombre','entity','name','institucion'].find(k => k in sample);

    // Prefer explicit no-client key, fallback to generic tna
    const tnaNoClienteKey = ['tnaNoClientes','tna_no_clientes','tnaNoCliente','tasaNoClientes','noClientes']
      .find(k => k in sample && sample[k] != null && !isNaN(parseFloat(sample[k])) && parseFloat(sample[k]) > 0);
    const tnaKey = tnaNoClienteKey ?? ['tna','TNA','tasa','rate'].find(k => k in sample);

    const top5 = [...latest]
      .filter(x => tnaKey && x[tnaKey] != null && !isNaN(parseFloat(x[tnaKey])) && parseFloat(x[tnaKey]) > 0)
      .sort((a, b) => parseFloat(b[tnaKey]) - parseFloat(a[tnaKey]))
      .slice(0, 5);

    if (!top5.length) throw new Error('No se encontraron tasas');

    const maxTna = parseFloat(top5[0][tnaKey]);

    const rows = top5.map((item, i) => {
      const tna = parseFloat(item[tnaKey]);
      const nombre = entKey ? item[entKey] : 'Entidad ' + (i+1);
      const bar = Math.round((tna / maxTna) * 100);
      const color = i === 0 ? 'var(--accent)' : 'var(--accent2)';
      return `
        <div style="display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid rgba(30,35,48,0.6);">
          <span style="font-family:var(--mono);font-size:0.55rem;color:var(--muted);width:12px;text-align:center;">${i+1}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:0.72rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);">${nombre}</div>
            <div style="height:2px;background:var(--border);border-radius:2px;margin-top:5px;">
              <div style="height:2px;width:${bar}%;background:${color};border-radius:2px;"></div>
            </div>
          </div>
          <span style="font-family:var(--mono);font-size:0.9rem;font-weight:700;color:${color};white-space:nowrap;">${fmt(tna,1)}%</span>
        </div>`;
    }).join('');

    const label = tnaNoClienteKey ? 'No Clientes · TNA' : 'TNA';
    el.innerHTML = `
      <div class="metric-label">🏆 Top 5 Plazo Fijo · ${label}</div>
      <div style="margin-top:0.4rem;">${rows}</div>
      <div class="metric-sub" style="margin-top:0.6rem;font-size:0.58rem;">${lastFecha ? '📅 ' + lastFecha : ''} · ${latest.length} entidades</div>
    `;
  } catch(e) {
    console.error('PF error:', e);
    el.innerHTML = '<div class="metric-label">Plazo Fijo</div><div class="error-msg">Sin datos disponibles<br><span style="font-size:0.6rem;opacity:0.5;">' + e.message + '</span></div>';
  }
}

// ------ Generic table renderer ------
function renderTable(el, data, title) {
  if (!data || !data.length) {
    el.innerHTML = '<div class="error-msg">Sin datos disponibles</div>';
    return;
  }

  // Detect keys
  const sample = data[0];
  const tickerKey = ['symbol','ticker','SYMBOL','codigo','name','NAME'].find(k => k in sample);
  const priceKey  = ['price','Price','PRICE','c','close','Close','ultimo','last','px'].find(k => k in sample);
  const chgKey    = ['change_pct','chg','CHG','variacion','change','pct_change','var_pct'].find(k => k in sample);
  const volKey    = ['volume','Volume','vol','VOL','volumen'].find(k => k in sample);

  const rows = data.slice(0, 20).map(item => {
    const chg = chgKey ? item[chgKey] : null;
    const chgClass = chg == null ? '' : chg >= 0 ? 'change-pos' : 'change-neg';
    const chgSign  = chg == null ? '—' : (chg >= 0 ? '+' : '') + fmt(chg, 2) + '%';
    return `<tr>
      <td class="ticker">${tickerKey ? item[tickerKey] : '—'}</td>
      <td class="price-col">${priceKey ? '$' + fmt(item[priceKey], 2) : '—'}</td>
      <td class="${chgClass}">${chgSign}</td>
      ${volKey ? `<td style="color:var(--muted);font-size:0.65rem;">${fmt(item[volKey]/1e6,2)}M</td>` : ''}
    </tr>`;
  }).join('');

  el.innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Símbolo</th>
          <th>Precio</th>
          <th>Var %</th>
          ${volKey ? '<th>Vol</th>' : ''}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ------ Acciones ------
async function loadStocks() {
  const el = document.getElementById('card-stocks');
  try {
    const data = await fetchData(SOURCES.Acciones_Arg);
    const arr = Array.isArray(data) ? data : (data.data ?? []);
    renderTable(el, arr, 'Acciones');
  } catch(e) {
    el.innerHTML = '<div class="error-msg">Sin datos disponibles</div>';
  }
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('update-time').textContent =
    'Actualizado: ' + now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

async function loadAll() {
  updateTimestamp();
  await Promise.allSettled([
    loadMEP(),
    loadCCL(),
    loadBCRA(),
    loadPF(),
    loadStocks(),
    loadBonds(),
    loadNotes()
  ]);
  updateTimestamp();
}

// Init
loadAll();

// Auto-refresh every 60 seconds
setInterval(loadAll, 30000);
</script>
